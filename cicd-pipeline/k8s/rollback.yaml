apiVersion: batch/v1
kind: Job
metadata:
  name: cicd-app-rollback
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: deploy-bot
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - kubectl rollout undo deployment/cicd-app

