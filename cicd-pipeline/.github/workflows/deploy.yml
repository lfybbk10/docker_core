name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_NAMESPACE: cicd-demo

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run tests
        run: ./gradlew test

  package-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build preview artifact
        run: ./gradlew bootJar -x test

  build-and-push:
    needs: [test, package-preview]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            VERSION="$(git describe --tags --always --dirty | sed 's/^v//')"
          fi
          SHORT_SHA="$(git rev-parse --short HEAD)"
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push image with Jib
        env:
          IMAGE_REPOSITORY: ${{ steps.meta.outputs.image }}
          IMAGE_TAGS: latest,${{ steps.meta.outputs.version }},${{ steps.meta.outputs.short_sha }}
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew jib

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image }}
      APP_VERSION: ${{ needs.build-and-push.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"

      - name: Apply Kubernetes manifests
        run: |
          kubectl create namespace "${K8S_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${K8S_NAMESPACE}" apply -f k8s/service.yaml
          kubectl -n "${K8S_NAMESPACE}" apply -f k8s/deployment.yaml

      - name: Roll out new image
        shell: bash
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/cicd-app cicd-app="${IMAGE}:${APP_VERSION}"
          kubectl -n "${K8S_NAMESPACE}" set env deployment/cicd-app APP_VERSION="${APP_VERSION}" DEPLOY_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/cicd-app --timeout=180s

      - name: Roll back failed rollout
        if: failure()
        run: kubectl -n "${K8S_NAMESPACE}" rollout undo deployment/cicd-app

  post-deploy-health:
    needs: deploy
    runs-on: ubuntu-latest
    if: needs.deploy.result == 'success'
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"

      - name: Run in-cluster health check
        run: |
          kubectl -n "${K8S_NAMESPACE}" run "health-check-${GITHUB_RUN_ID}" \
            --image=curlimages/curl:8.7.1 \
            --restart=Never \
            --rm -i --quiet \
            -- curl -fsS http://cicd-app:8080/health

  notify:
    needs: [test, package-preview, build-and-push, deploy, post-deploy-health]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Publish job summary
        shell: bash
        run: |
          {
            echo "## Deployment summary"
            echo "- tests: ${{ needs.test.result }}"
            echo "- package-preview: ${{ needs.package-preview.result }}"
            echo "- build-and-push: ${{ needs.build-and-push.result }}"
            echo "- deploy: ${{ needs.deploy.result }}"
            echo "- health-check: ${{ needs.post-deploy-health.result }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Optional Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: bash
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            exit 0
          fi
          STATUS="${{ needs.post-deploy-health.result }}"
          if [[ "${STATUS}" == "skipped" ]]; then
            STATUS="${{ needs.deploy.result }}"
          fi
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"CI/CD pipeline for ${GITHUB_REPOSITORY} finished with status: ${STATUS}\"}" \
            "${SLACK_WEBHOOK_URL}"

