services:
  gateway:
    build:
      context: .
      args:
        SERVICE: gateway.GatewayService
    ports:
      - "8080:8080"
    environment:
      SERVICES_PROCESSING_URL: http://processing:8080
    networks:
      - public-net
      - internal-net
    depends_on:
      processing:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  processing:
    build:
      context: .
      args:
        SERVICE: processing.ProcessingService
    environment:
      SERVICES_STORAGE_URL: http://storage:8080
    networks:
      - internal-net
      - storage-net
    depends_on:
      storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  storage:
    build:
      context: .
      args:
        SERVICE: storage.StorageService
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      STORAGE_PATH: /data/storage-message.txt
    networks:
      - storage-net
    volumes:
      - storage-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    networks:
      - storage-net
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  public-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true
  storage-net:
    driver: bridge
    internal: true

volumes:
  storage-data:
  redis-data:
