apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: mentee-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: hashicorp/http-echo
          args:
            - "-text={\"service\":\"product-service\",\"status\":\"ok\"}"
            - "-listen=:8081"
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: mentee-shop
spec:
  type: ClusterIP
  selector:
    app: product-service
  ports:
    - port: 8081
      targetPort: 8081
