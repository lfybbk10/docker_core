apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: mentee-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
        - name: admin-service
          image: hashicorp/http-echo
          args:
            - "-text={\"service\":\"admin-service\",\"status\":\"ok\"}"
            - "-listen=:8083"
          ports:
            - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: mentee-shop
spec:
  type: ClusterIP
  selector:
    app: admin-service
  ports:
    - port: 8083
      targetPort: 8083
