apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: mentee-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: hashicorp/http-echo
          args:
            - "-text={\"service\":\"order-service\",\"status\":\"ok\"}"
            - "-listen=:8082"
          ports:
            - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: mentee-shop
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - port: 8082
      targetPort: 8082
