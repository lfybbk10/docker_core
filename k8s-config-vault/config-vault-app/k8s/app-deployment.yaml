apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-vault-app
  template:
    metadata:
      labels:
        app: config-vault-app
    spec:
      serviceAccountName: config-vault-service
      containers:
        - name: config-vault-app-container
          image: config-vault-app:1.3
          ports:
            - containerPort: 8080
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD

            - name: SPRING_CLOUD_VAULT_URI
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: SPRING_CLOUD_VAULT_AUTHENTICATION
              value: "KUBERNETES"
            - name: SPRING_CLOUD_VAULT_KUBERNETES_ROLE
              value: "config-vault-app"
            - name: SPRING_CLOUD_VAULT_KUBERNETES_SERVICE_ACCOUNT_TOKEN_FILE
              value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
          volumeMounts:
            - name: config-volume
              mountPath: /config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: app-config