apiVersion: v1
kind: ConfigMap
metadata:
  name: calculator-config
  namespace: configurable-calculator-app
data:
  # Переменные окружения
  SERVER_PORT: "8080"
  LOG_LEVEL: "INFO"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "calculator_db"
  CACHE_ENABLED: "true"

  # Файлы конфигурации
  application.properties: |
    SERVER_PORT=8080
    LOG_LEVEL=INFO
    CACHE_ENABLED=true

  database.properties: |
    DATABASE_HOST=postgres-service
    DATABASE_PORT=5432
    DATABASE_NAME=calculator_db